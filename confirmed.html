<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmed – Clariti</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}body{font-family:'Plus Jakarta Sans',sans-serif;background:#fafcfd;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:20px}
        .card{background:#fff;border-radius:24px;padding:56px 40px;max-width:480px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,.06);border:1px solid #e2e8f0}
        .icon{width:72px;height:72px;margin:0 auto 20px;background:linear-gradient(135deg,#0891b2,#06b6d4);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:34px;color:white;box-shadow:0 8px 24px rgba(8,145,178,.25)}
        h1{font-size:26px;font-weight:800;margin-bottom:8px;color:#0f172a}p{color:#64748b;font-size:15px;margin-bottom:28px;line-height:1.6}
        .btn{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;border-radius:60px;font-weight:700;font-size:15px;text-decoration:none;background:#0891b2;color:white;transition:all .25s}.btn:hover{background:#0e7490;transform:translateY(-2px)}
    </style>
</head>
<body>
    <div class="card">
        <div class="icon"><i class="fas fa-check-circle"></i></div>
        <h1>Access Confirmed!</h1>
        <p>Authorization successful. You can close this page and return to your WordPress dashboard.</p>
        <a href="index.html" class="btn"><i class="fas fa-arrow-left"></i> Back to Clariti</a>
    </div>
</body>
</html>
